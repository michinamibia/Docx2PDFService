services:
  docx2pdf:
    build: .
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - LibreOffice__ExecutablePath=libreoffice
      - ASPNETCORE_ENVIRONMENT=Production
      # Optional: configure Azure Blob Storage to store PDFs and return a URL.
      # Leave blank (or omit) to return PDF bytes directly.
      - AzureBlob__ConnectionString=
      - AzureBlob__ContainerName=pdfs
      - AzureBlob__SasExpiryHours=24
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
