services:
  docx2pdf:
    build: .
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - LibreOffice__ExecutablePath=libreoffice
      - ASPNETCORE_ENVIRONMENT=Production
      # AzureBlob__ConnectionString and AzureBlob__ContainerName are intentionally
      # NOT set here. Inject them via Azure Container Apps secrets / environment
      # variables so they are never stored in source control.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
